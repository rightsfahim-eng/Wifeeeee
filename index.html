<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Nusrat 🦋</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');

  @font-face {
    font-family: 'BanglaFont';
    src: url('bangla.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh;
    background: #1a0010;
    overflow: hidden;
    font-family: 'Comic Neue', 'Bangers', cursive;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Background text grid ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    grid-template-rows: repeat(auto-fill, minmax(60px, 1fr));
    gap: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    font-weight: 700;
    font-family: 'Bangers', cursive;
    letter-spacing: 2px;
    color: rgba(255, 60, 130, 0.18);
    user-select: none;
    white-space: nowrap;
    transition: color 0.1s;
  }

  /* ── Floating pill box ── */
  #pill-box {
    position: relative;
    z-index: 10;
    width: min(420px, 90vw);
    padding: 38px 32px 36px;
    border-radius: 60px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1.5px solid rgba(255, 255, 255, 0.22);
    box-shadow:
      0 8px 60px rgba(200, 0, 80, 0.25),
      0 2px 12px rgba(255,255,255,0.06) inset,
      0 -2px 8px rgba(255,255,255,0.04) inset;
    text-align: center;
    animation: float 4s ease-in-out infinite;
  }

  /* water shimmer overlay */
  #pill-box::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 60px;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.12) 0%,
      rgba(255,255,255,0.03) 40%,
      rgba(255,255,255,0.09) 100%
    );
    pointer-events: none;
  }

  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-12px); }
  }

  /* ── Initial button view ── */
  #view-initial { display: flex; flex-direction: column; align-items: center; gap: 20px; }

  .main-btn {
    background: linear-gradient(135deg, #ff3385, #c2006b);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Bangers', cursive;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(255,50,120,0.5);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .main-btn:hover { transform: scale(1.07); box-shadow: 0 6px 32px rgba(255,50,120,0.7); }

  /* ── Question view ── */
  #view-question { display: none; flex-direction: column; align-items: center; gap: 22px; }

  .question-text {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 16px rgba(255,80,160,0.8);
  }

  .btn-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }

  .btn-no {
    background: linear-gradient(135deg, #3a0020, #6b0030);
    color: #ff6699;
    border: 1.5px solid #ff3385;
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Bangers', cursive;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-no:hover { transform: scale(1.06); }

  .btn-yes {
    background: linear-gradient(135deg, #ff3385, #ff69b4);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Bangers', cursive;
    letter-spacing: 1.5px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,50,120,0.5);
    transition: transform 0.15s;
  }
  .btn-yes:hover { transform: scale(1.06); }
</style>
</head>
<body>

<!-- Background text grid -->
<div id="bg-canvas"></div>

<!-- Floating pill -->
<div id="pill-box">
  <div id="view-initial">
    <button class="main-btn" onclick="showQuestion()">Click To Karo Meri Jan 💖</button>
  </div>
  <div id="view-question">
    <div class="question-text">Do You Love Faheem? 🦋</div>
    <div class="btn-row">
      <button class="btn-no" onclick="goNo()">I don't Love Him 😡</button>
      <button class="btn-yes" onclick="goYes()">Yes I Love Him 😭</button>
    </div>
  </div>
</div>

<script>
// ── Hacking-style text cycler for each bg cell ──
const words = ["Hi Nusrat", "Oyee Nusrat", "Eije Nusrat"];
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&";

// Build grid
const canvas = document.getElementById('bg-canvas');
const cols = Math.ceil(window.innerWidth / 180) + 1;
const rows = Math.ceil(window.innerHeight / 60) + 2;
const cells = [];

for (let i = 0; i < cols * rows; i++) {
  const el = document.createElement('div');
  el.className = 'bg-cell';
  canvas.appendChild(el);
  cells.push(el);
}

// Each cell cycles independently with random offset
function hackReveal(el, targetWord, onDone) {
  let frame = 0;
  const totalFrames = 18;
  const interval = setInterval(() => {
    if (frame >= totalFrames) {
      el.textContent = targetWord;
      clearInterval(interval);
      if (onDone) onDone();
      return;
    }
    // scramble
    el.textContent = targetWord.split('').map((c, i) => {
      if (c === ' ') return ' ';
      if (frame / totalFrames > i / targetWord.length) return c;
      return chars[Math.floor(Math.random() * chars.length)];
    }).join('');
    frame++;
  }, 45);
}

function startCell(el) {
  let wordIdx = Math.floor(Math.random() * words.length);
  function cycle() {
    hackReveal(el, words[wordIdx], () => {
      // pause then next word
      setTimeout(() => {
        wordIdx = (wordIdx + 1) % words.length;
        cycle();
      }, 900 + Math.random() * 800);
    });
  }
  // staggered start
  setTimeout(cycle, Math.random() * 3000);
}

cells.forEach(el => startCell(el));

// ── Button logic ──
function showQuestion() {
  document.getElementById('view-initial').style.display = 'none';
  const q = document.getElementById('view-question');
  q.style.display = 'flex';
}

function goNo()  { window.location.href = 'no.html'; }
function goYes() { window.location.href = 'yes.html'; }
</script>
</body>
</html>
