<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tsk Tsk 😤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&display=swap');

  @font-face {
    font-family: 'BanglaFont';
    src: url('bangla.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Comic Neue', 'Bangers', cursive;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255, 50, 100, 0.35);
    border-radius: 24px;
    padding: 44px 40px;
    max-width: 480px;
    width: 90vw;
    text-align: center;
    box-shadow: 0 0 60px rgba(200,0,60,0.15);
  }

  .card-text {
    font-family: 'BanglaFont', 'Bangers', cursive;
    font-size: 1.45rem;
    letter-spacing: 1px;
    color: #ff6699;
    line-height: 1.85;
    margin-bottom: 32px;
    text-shadow: 0 0 12px rgba(255,50,100,0.5);
  }

  .card img {
    width: 100%;
    max-width: 340px;
    border-radius: 16px;
    box-shadow: 0 4px 32px rgba(255,50,100,0.25);
  }

  .back-btn {
    display: inline-block;
    margin-top: 28px;
    background: transparent;
    border: 1.5px solid #ff3385;
    color: #ff3385;
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .back-btn:hover { background: #ff3385; color: #fff; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-text">
      আমি জানি তোমার মাতায় সমস্যা আছে<br>
      তাই তোমার চিকিৎসার জন্যে<br>
      এই ঔষুধ 😊🫶
    </div>
    <img src="photo.png" alt="medicine" />
    <br>
    <button class="back-btn" onclick="window.location.href='index.html'">← Wapis Jao</button>
  </div>
</body>
</html>
